<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages serves this 404.html for deep SPA routes.
      // Append /index.html so GitHub serves the SPA entry point,
      // and React Router resolves the original path.
      window.location.replace(window.location.pathname + "/index.html");
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
