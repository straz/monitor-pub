<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages serves this 404.html for deep SPA routes.
      // Redirect to /index.html (the only file GitHub actually serves)
      // with the original path as a query param so the app can navigate there.
      window.location.replace("/index.html?redirect=" + encodeURIComponent(window.location.pathname));
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
