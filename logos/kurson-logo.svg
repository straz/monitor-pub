<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 0 80 110" width="100%" height="100%">
  <!-- Icon Mark (Integrated Medical Cross & K) -->
  <g transform="translate(20, 23)">
    <!-- Left arm of the cross -->
    <line x1="30" y1="35" x2="5" y2="35" stroke="#52A5B4" stroke-width="18" stroke-linecap="round" />
    
    <!-- Top Right branch of K -->
    <line x1="30" y1="35" x2="55" y2="10" stroke="#00799E" stroke-width="18" stroke-linecap="round" />
    
    <!-- Bottom Right branch of K -->
    <line x1="30" y1="35" x2="55" y2="60" stroke="#00A2B8" stroke-width="18" stroke-linecap="round" />

    <!-- Central Vertical Stem (Rendered on top to seamlessly anchor the branches) -->
    <line x1="30" y1="10" x2="30" y2="60" stroke="#013A63" stroke-width="18" stroke-linecap="round" />
  </g>

</svg>